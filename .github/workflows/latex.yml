# =============================================================================
# LaTeX Article — Build PDF + Semantic Versioning
# =============================================================================
# CI: Compiles LaTeX on every push to main (validates document)
# Release: On tag v*.*.* → compile PDF + attach to GitHub Release
# =============================================================================

name: LaTeX Article

on:
  push:
    branches: [main]
    paths:
      - "**.tex"
      - "**.bib"
      - "figures/**"
      - ".github/workflows/latex.yml"
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  # --- Job 1: Compile LaTeX document ---
  build:
    name: Build PDF
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          latexmk_use_lualatex: false
          latexmk_shell_escape: false

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v7
        with:
          name: chest-xpert-article
          path: main.pdf
          retention-days: 30

  # --- Job 2: Create release with PDF (only on tags) ---
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download PDF artifact
        uses: actions/download-artifact@v4
        with:
          name: chest-xpert-article

      - name: Rename PDF with version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cp main.pdf "chest-xpert-mlops-article-v${VERSION}.pdf"

      - name: Create GitHub Release with PDF
        uses: softprops/action-gh-release@v3
        with:
          files: "chest-xpert-mlops-article-*.pdf"
          generate_release_notes: true
          body: |
            ## Chest Xpert AI — Modelos en Producción

            PDF del artículo compilado automáticamente desde LaTeX.

            ### Descargar
            El PDF está adjunto como asset de este release.
